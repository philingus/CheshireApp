<!DOCTYPE html>
<html>
<head>
  <title>Training Model</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="space-bg" onload="startModelTraining()">
  <main class="phone">
    <div class="screen progress-screen">
      <p class="lavender">Personalized LSTM</p>
      <h1 class="progress-title">Training your model</h1>
      <p class="progress-sub">Learning your unique motion signature.</p>

      <svg class="nn-viz" viewBox="0 0 200 100">
        <line x1="20" y1="20" x2="100" y2="20"/><line x1="20" y1="20" x2="100" y2="50"/><line x1="20" y1="20" x2="100" y2="80"/>
        <line x1="20" y1="50" x2="100" y2="20"/><line x1="20" y1="50" x2="100" y2="50"/><line x1="20" y1="50" x2="100" y2="80"/>
        <line x1="20" y1="80" x2="100" y2="20"/><line x1="20" y1="80" x2="100" y2="50"/><line x1="20" y1="80" x2="100" y2="80"/>
        <line x1="100" y1="20" x2="180" y2="35"/><line x1="100" y1="20" x2="180" y2="65"/>
        <line x1="100" y1="50" x2="180" y2="35"/><line x1="100" y1="50" x2="180" y2="65"/>
        <line x1="100" y1="80" x2="180" y2="35"/><line x1="100" y1="80" x2="180" y2="65"/>
        <circle cx="20" cy="20" r="5"/><circle cx="20" cy="50" r="5"/><circle cx="20" cy="80" r="5"/>
        <circle cx="100" cy="20" r="5"/><circle cx="100" cy="50" r="5"/><circle cx="100" cy="80" r="5"/>
        <circle cx="180" cy="35" r="5"/><circle cx="180" cy="65" r="5"/>
      </svg>

      <div class="progress-bar-wrap">
        <div class="progress-bar"><span id="progressFill"></span></div>
        <div class="progress-percent"><span id="progressPct">0%</span></div>
      </div>

      <p class="progress-status" id="progressStatus">Initializing...</p>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
