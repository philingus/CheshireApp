<!DOCTYPE html>
<html>
<head>
  <title>Phrase History</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="space-bg">
  <main class="phone">
    <div class="screen">
      <h1 class="serif">Phrase History</h1>

      <input class="search" placeholder="Search your phrases...">

      <div class="chips">
        <button>Today</button>
        <button>This Week</button>
        <button>By Phrase</button>
      </div>

      <div class="history-row">9:41 AM — “I'm hungry.” 🔄 94% ▶</div>
      <div class="history-row">9:18 AM — “I love you.” 👆 91% ▶</div>
      <div class="history-row">Yesterday — “I need help.” ✋ 96% ▶</div>

      <p class="powered">Reading from Snowflake phrase_logs table</p>
    </div>
  </main>
</body>
</html>
