<!DOCTYPE html>
<html>
<head>
  <title>Voice Consent</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="space-bg">
  <main class="phone">
    <div class="screen center-screen">
      <div class="glass-card">
        <h1 class="serif italic">Your voice belongs to you.</h1>
        <p>
          To speak in your voice, Cheshire needs your permission.
          We'll record a 30-second sample. You can revoke this consent at any time.
        </p>

        <div class="record-wrap">
          <div class="record-ring"></div>
          <div class="record-ring"></div>
          <div class="record-ring"></div>
          <button id="recordBtn" class="record-btn-new" onclick="startRecording()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M9 18V5l12-2v13"/>
              <circle cx="6" cy="18" r="3"/>
              <circle cx="18" cy="16" r="3"/>
            </svg>
          </button>
        </div>
        <div class="record-timer" id="recordTimer">Tap to record</div>

        <div id="waveform" class="mini-wave hidden"></div>

        <label class="check-row">
          <input type="checkbox" id="consentCheck" onchange="toggleConsent()" disabled>
          I consent to my voice being used by Cheshire for my own communication only.
        </label>

        <a id="continueConsent" class="main-btn disabled" href="#">Continue</a>

        <p class="powered">Powered by <strong>ElevenLabs</strong></p>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
