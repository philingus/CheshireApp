<!DOCTYPE html>
<html>
<head>
  <title>Gesture Training</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="space-bg">
  <main class="phone">
    <div class="screen center-screen">
      <p class="step">Training gesture 1 of 5</p>
      <h1 class="serif italic">“I'm hungry.”</h1>

      <div class="gesture-circle">
        <div class="phone-outline">📱</div>
        <p id="countdown">Perform your gesture now</p>
      </div>

      <div class="samples">
        <div id="s1">Sample 1</div>
        <div id="s2">Sample 2</div>
        <div id="s3">Sample 3</div>
        <div id="s4">Sample 4</div>
        <div id="s5">Sample 5</div>
      </div>

      <button class="main-btn" onclick="captureSamples()">Start Training</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
