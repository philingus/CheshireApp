<!DOCTYPE html>
<html>
<head>
  <title>Cheshire Auth</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="purple-bg">

  <main class="phone">
    <div class="screen auth-screen">

      <div class="logo-glow">Cheshire</div>

      <h1>Secure Voice Access</h1>
      <p class="subtitle">
        Every speech act is protected by consent and authorization.
      </p>

      <button class="pill-btn" onclick="openAuth('patient')">
        I'm a patient
      </button>

      <button class="pill-btn" onclick="openAuth('caregiver')">
        I'm a caregiver
      </button>

      <p class="auth0-text">
        Secure access by <strong>Auth0</strong>
      </p>

      <div id="authModal" class="auth-modal">
        <h2>Auth0 Login</h2>
        <p id="roleText">Signing in...</p>

        <input placeholder="Email">
        <input placeholder="Password" type="password">

        <button class="main-btn" onclick="verifyIdentity()">
          Continue
        </button>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
